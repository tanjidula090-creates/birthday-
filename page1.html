<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Menu</title>
    <style>
        :root {
            --accent: #ffb6c1;
            --bg1: #222;
            --bg2: #000;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 55%, var(--bg2) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #fff;
            filter: blur(10px);
            transition: filter 0.5s ease;
        }

        .content {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 48px;
            color: var(--accent);
        }

        h4 {
            margin: 12px 0;
            font-size: 28px;
        }

        a {
            color: #fff;
            text-decoration: none;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px #fff, 0 0 16px var(--accent);
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.4); }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Click the below emojis </h1>
        <br><h3><a href="page2.html">📃</a></h3>
        <br><h3><a href="page5.html">🦫</a></h3>
        <br><h3><a href="page4.html">🖼️</a></h3>
    </div>

    <script>
        const frag = document.createDocumentFragment();

        for (let i = 0; i < 80; i++) {
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.style.left = Math.random() * 100 + "vw";
            sparkle.style.top = Math.random() * 100 + "vh";
            sparkle.style.animationDelay = Math.random() * 2 + "s";
            frag.appendChild(sparkle);
        }

        document.body.appendChild(frag);

        setTimeout(() => {
            document.body.style.filter = "blur(0)";
        }, 2000);
    </script>
</body>
</html>
